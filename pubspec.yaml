name: workout_app_rewrite
description: Local-first workout planner and tracker.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^15.1.2
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0
  collection: ^1.19.1
  uuid: ^4.5.1
  file_picker: ^10.3.10
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  test: ^1.26.0
  sqlite3: ^2.9.4
  build_runner: ^2.11.1
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
